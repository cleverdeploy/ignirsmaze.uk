<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ignir's Maze</title>
<meta name="description" content="Ignir's Maze.">
<meta name="robots" content="index,follow">
<meta property="og:title" content="Ignir's Maze">
<meta property="og:description" content="The way in is not the way out.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ignirsmaze.uk/">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <svg class="sigil" viewBox="0 0 200 200" aria-hidden="true">
      <defs>
        <radialGradient id="g" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffb46b" stop-opacity="0.9"/>
          <stop offset="55%" stop-color="#c2410c" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="100" cy="100" r="90" fill="url(#g)"/>
      <g fill="none" stroke="#f4a261" stroke-width="1.4" stroke-linecap="square" opacity="0.85">
        <path d="M100 30 L100 60 L70 60 L70 90 L40 90 L40 130 L70 130 L70 110 L90 110 L90 150 L130 150 L130 110 L150 110 L150 80 L130 80 L130 50 L160 50"/>
        <path d="M100 100 L110 100 L110 90 L100 90 Z" fill="#f4a261" stroke="none"/>
      </g>
    </svg>

    <h1>Ignir's Maze</h1>
    <p class="lede">The way in is not the way out.</p>

    <p class="meta" id="meta">
      <span class="dot"></span>
      <span id="cycle">tending the embers</span>
    </p>
  </main>

  <footer>
    <span>MMXXVI</span>
    <span class="sep">·</span>
    <span>by invitation</span>
  </footer>

  <script>
    const phrases = [
      "tending the embers",
      "drawing the walls",
      "listening for footsteps",
      "the lamp is lit",
      "an opening, perhaps"
    ];
    let i = 0;
    const el = document.getElementById("cycle");
    setInterval(() => {
      i = (i + 1) % phrases.length;
      el.style.opacity = 0;
      setTimeout(() => { el.textContent = phrases[i]; el.style.opacity = 1; }, 600);
    }, 4200);
  </script>
</body>
</html>
